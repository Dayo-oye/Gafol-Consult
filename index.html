// --- Custom Hooks ---
function useScrollReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('reveal-visible');
          // Optional: observer.unobserve(entry.target) to animate only once
        }
      },
      { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
    );
    if (ref.current) {
      observer.observe(ref.current);
    }
    return () => {
      if (ref.current) observer.unobserve(ref.current);
    };
  }, []);
  return ref;
}

// --- Components ---
const Reveal = ({ children, direction = 'up', delay = 0, className = '' }) => {
  const ref = useScrollReveal();
  const directionClass = direction === 'up' ? 'reveal-up' : direction === 'left' ? 'reveal-left' : 'reveal-right';
  return (
    <div
      ref={ref}
      className={`reveal-wrapper ${directionClass} ${className}`}
      style={{ '--delay': `${delay}ms` }}
    >
      {children}
    </div>
  );
};

const DropdownMenu = ({ title, items, isOpen, onToggle, scrolled }) => {
  const menuRef = useRef(null);
  
  useEffect(() => {
    const handleClickOutside = (event) => {
      if (menuRef.current && !menuRef.current.contains(event.target)) {
        if(isOpen) onToggle();
      }
    };
    if (isOpen) {
      document.addEventListener("mousedown", handleClickOutside);
    }
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [isOpen, onToggle]);

  return (
    <div className="relative" ref={menuRef}>
      <button onClick={onToggle} className={`flex items-center gap-1 text-sm font-semibold transition-colors py-2 ${scrolled ? 'text-slate-600 hover:text-sky' : 'text-white/80 hover:text-white'}`}>

// --- Preloader Component ---
const Preloader = () => {
  const [isVisible, setIsVisible] = useState(true);
  const [shouldRender, setShouldRender] = useState(true);

  useEffect(() => {
    // Cleanup static preloader
    const staticPreloader = document.getElementById('initial-preloader');
    if (staticPreloader) {
      staticPreloader.style.opacity = '0';
      setTimeout(() => staticPreloader.remove(), 500);
    }

    const timer = setTimeout(() => setIsVisible(false), 1200);
    const removeTimer = setTimeout(() => setShouldRender(false), 2200);
    return () => { clearTimeout(timer); clearTimeout(removeTimer); };
  }, []);

  if (!shouldRender) return null;

  return (
    <div className={`fixed inset-0 z-[9999] bg-[#0A192F] flex items-center justify-center transition-opacity duration-1000 ${isVisible ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
      <div className="relative flex flex-col items-center">

          ))}
        </div>
      </div>
    </div>
  );
};
