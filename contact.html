  <script type="text/babel">
const { useState, useEffect, useRef } = React;

const Reveal = ({ children, direction = 'up', delay = 0 }) => {
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([e]) => { if(e.isIntersecting) e.target.classList.add('reveal-visible')});
    if(ref.current) observer.observe(ref.current);
    return () => { if(ref.current) observer.unobserve(ref.current); };
  }, []);
  return <div ref={ref} className={`reveal-wrapper reveal-${direction}`} style={{'--delay': `${delay}ms`}}>{children}</div>;
};

// --- Preloader Component ---
const Preloader = () => {
  const [isVisible, setIsVisible] = useState(true);
  const [shouldRender, setShouldRender] = useState(true);

  useEffect(() => {
    // Cleanup static preloader
    const staticPreloader = document.getElementById('initial-preloader');
    if (staticPreloader) {
      staticPreloader.style.opacity = '0';
      setTimeout(() => staticPreloader.remove(), 500);
    }

    const timer = setTimeout(() => setIsVisible(false), 1200);
    const removeTimer = setTimeout(() => setShouldRender(false), 2200);
    return () => { clearTimeout(timer); clearTimeout(removeTimer); };
  }, []);

  if (!shouldRender) return null;

  return (
    <div className={`fixed inset-0 z-[9999] bg-[#0A192F] flex items-center justify-center transition-opacity duration-1000 ${isVisible ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
      <div className="relative flex flex-col items-center">
        <div className="absolute -inset-8 border border-sky/10 rounded-full animate-ping opacity-20"></div>
        <img src="assets/images/gafol.png" className="h-24 md:h-32 w-auto animate-pulse-slow object-contain" alt="Gafol Consult" />
        <div className="mt-8 flex gap-1">
          {[0, 1, 2].map(i => (
            <div key={i} className="w-1.5 h-1.5 bg-sky rounded-full animate-bounce" style={{ animationDelay: `${i * 0.15}s` }}></div>
          ))}
        </div>
      </div>
    </div>
  );
};

                </div>

        </div>

      {/* Contact Content */}
      <section className="py-24 bg-white">
        <div className="container-custom">
           <div className="grid lg:grid-cols-2 gap-20">
             <Reveal direction="left">
               <div>
                  <h2 className="text-4xl font-display font-bold text-navy mb-8">Send Us a Message.</h2>

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ContactPage />);
