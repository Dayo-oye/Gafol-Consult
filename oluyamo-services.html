  <script type="text/babel">
const { useState, useEffect, useRef } = React;

// --- Components ---
const IconSVG = ({ path, className = "w-6 h-6" }) => (
  <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d={path} />
  </svg>
);

const Reveal = ({ children, direction = 'up', delay = 0, className = '' }) => {
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) entry.target.classList.add('reveal-visible');
    }, { threshold: 0.1 });
    if (ref.current) observer.observe(ref.current);
    return () => { if (ref.current) observer.unobserve(ref.current); };
  }, []);
  const directionClass = direction === 'up' ? 'reveal-up' : direction === 'left' ? 'reveal-left' : 'reveal-right';
  return (
    <div ref={ref} className={`reveal-wrapper ${directionClass} ${className}`} style={{ '--delay': `${delay}ms` }}>
      {children}
    </div>
  );
};

// --- Preloader Component ---
const Preloader = () => {
  const [isVisible, setIsVisible] = useState(true);
  const [shouldRender, setShouldRender] = useState(true);

  useEffect(() => {
    // Cleanup static preloader
    const staticPreloader = document.getElementById('initial-preloader');
    if (staticPreloader) {
      staticPreloader.style.opacity = '0';
      setTimeout(() => staticPreloader.remove(), 500);
    }

    const timer = setTimeout(() => setIsVisible(false), 1200);
    const removeTimer = setTimeout(() => setShouldRender(false), 2200);
    return () => { clearTimeout(timer); clearTimeout(removeTimer); };
  }, []);

  if (!shouldRender) return null;

  return (
    <div className={`fixed inset-0 z-[9999] bg-[#0A192F] flex items-center justify-center transition-opacity duration-1000 ${isVisible ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
      <div className="relative flex flex-col items-center">
        <div className="absolute -inset-8 border border-sky/10 rounded-full animate-ping opacity-20"></div>
        <img src="assets/images/logo OG.png" className="h-24 md:h-32 w-auto animate-pulse-slow object-contain" alt="Oluyamo Gabriel & Co" />
        <div className="mt-8 flex gap-1">
          {[0, 1, 2].map(i => (
            <div key={i} className="w-1.5 h-1.5 bg-sky rounded-full animate-bounce" style={{ animationDelay: `${i * 0.15}s` }}></div>
          ))}
        </div>
      </div>
    </div>
  );
};

);

              </button>

                <div className="flex flex-col pl-4 pr-4 gap-1 border-l-2 border-sky/20 ml-8 mb-2">
                  <a href="oluyamo-services.html" className="py-2 text-sm font-medium text-slate-600 hover:text-sky">Audit & Assurance</a>

              >
                Contact
                <svg className={`w-4 h-4 transition-transform duration-200 ${activeDropdown === 'MobileContact' ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ServicesPage />);

</body>
